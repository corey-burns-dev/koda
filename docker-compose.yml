version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PUNCH_HOST: 0.0.0.0
      PUNCH_PORT: 8080
      PUNCH_CORS_ORIGIN: http://localhost:3000
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_HTTP_URL: http://localhost:8080
        NEXT_PUBLIC_BACKEND_WS_URL: ws://localhost:8080
    environment:
      NEXT_PUBLIC_BACKEND_HTTP_URL: http://localhost:8080
      NEXT_PUBLIC_BACKEND_WS_URL: ws://localhost:8080
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - "3000:3000"
