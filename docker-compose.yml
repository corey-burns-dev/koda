services:
  media:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8888:8888"
    volumes:
      - ./infra/mediamtx.yml:/mediamtx.yml:ro

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      KODA_HOST: 0.0.0.0
      KODA_PORT: 8080
      KODA_CORS_ORIGIN: http://localhost:3000
      KODA_MEDIA_RTMP_BASE_URL: rtmp://localhost:1935/live
      KODA_MEDIA_HLS_BASE_URL: http://localhost:8888/live
      KODA_DB_PATH: /app/data/koda.db
    volumes:
      - koda_data:/app/data
    depends_on:
      - media
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_HTTP_URL: http://localhost:8080
        NEXT_PUBLIC_BACKEND_WS_URL: ws://localhost:8080
    environment:
      NEXT_PUBLIC_BACKEND_HTTP_URL: http://localhost:8080
      NEXT_PUBLIC_BACKEND_WS_URL: ws://localhost:8080
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  koda_data:
